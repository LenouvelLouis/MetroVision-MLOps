services:
  # ── MetroVision API ──────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - LOG_LEVEL=info
      - METROVISION_API_KEYS_FILE=/run/secrets/api-keys
      # Redirect framework caches to writable tmpfs (root FS is read-only).
      - HOME=/tmp
      - XDG_CACHE_HOME=/tmp/.cache
      - KERAS_HOME=/tmp/.keras
      - MPLCONFIGDIR=/tmp/.matplotlib
      # OpenTelemetry (phase 7.5) -> Tempo via OTLP/HTTP
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318/v1/traces
      - OTEL_SERVICE_NAME=metrovision-api
    volumes:
      - ./.api-keys:/run/secrets/api-keys:ro
    read_only: true
    tmpfs:
      - /tmp:size=128M
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    restart: unless-stopped

  # One-shot: chown the (fresh) Postgres volume to uid 70 so the main
  # service can run as the `postgres` user from the start, skipping the
  # entrypoint's root-only chmod/gosu phase that would otherwise need
  # SETUID/CHOWN capabilities.
  mlflow-postgres-init:
    image: alpine:3.20.3@sha256:1e42bbe2508154c9126d48c2b8a75420c3544343bf86fd041fb7527e017a4b4a
    user: "0:0"
    volumes:
      - mlflow-postgres-data:/data
    command: ["sh", "-c", "chown -R 70:70 /data && chmod 700 /data"]
    restart: "no"

  # ── Postgres backing MLflow tracking (phase 6.1) ─────────────────────
  # Runs as uid 70 (postgres in alpine), with full cap_drop + no-new-privs.
  # The init service above pre-chowns the volume so the entrypoint never
  # needs root privileges.
  mlflow-postgres:
    image: postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
    user: "70:70"
    depends_on:
      mlflow-postgres-init:
        condition: service_completed_successfully
    environment:
      POSTGRES_DB: mlflow
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: ${POSTGRES_MLFLOW_PASSWORD:?POSTGRES_MLFLOW_PASSWORD is required}
    volumes:
      - mlflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflow"]
      interval: 5s
      timeout: 5s
      retries: 12
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    restart: unless-stopped

  # ── MinIO for MLflow artefacts (phase 6.2) ───────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-10-29T16-01-48Z@sha256:ebd2af76d40ff25ccc630533615f7ccd55fbe83d629a4b7c7a1b6311c1af3d6c
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9100:9000"
      - "127.0.0.1:9101:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    restart: unless-stopped

  # One-shot init: create the mlflow-artifacts bucket if missing.
  minio-init:
    image: minio/mc:RELEASE.2024-10-29T15-34-59Z@sha256:fb8e220caa54eed0847f7e48d4af83997e3308008261ae1612a0179f8d849ee9
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb -p local/mlflow-artifacts 2>/dev/null || true
        echo "Bucket mlflow-artifacts ready."
    restart: "no"

  # ── MLflow tracking server ───────────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    ports:
      - "127.0.0.1:5000:5000"
    depends_on:
      mlflow-postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - mlflow-data:/mlflow
      - ./monitoring/mlflow_basic_auth.ini:/etc/mlflow/basic_auth.ini:ro
    environment:
      - MLFLOW_AUTH_CONFIG_PATH=/etc/mlflow/basic_auth.ini
      - MLFLOW_FLASK_SERVER_SECRET_KEY=${MLFLOW_FLASK_SERVER_SECRET_KEY:?MLFLOW_FLASK_SERVER_SECRET_KEY is required}
      # boto3 / MLflow talk to MinIO using AWS-style env vars.
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      # Connection URI (Postgres) passed via env so the password stays out of `command:`.
      - POSTGRES_MLFLOW_PASSWORD=${POSTGRES_MLFLOW_PASSWORD:?POSTGRES_MLFLOW_PASSWORD is required}
    command: >
      mlflow server
      --app-name basic-auth
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql+psycopg2://mlflow:${POSTGRES_MLFLOW_PASSWORD}@mlflow-postgres:5432/mlflow
      --artifacts-destination s3://mlflow-artifacts/
      --serve-artifacts
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    restart: unless-stopped

  # ── Prometheus ───────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.4.1@sha256:9abc6cf6aea7710d163dbb28d8eeb7dc5baef01e38fa4cd146a406dd9f07f70d
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    restart: unless-stopped

  # ── Alertmanager (phase 7.2) ─────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0@sha256:e13b6ed5cb929eeaee733479dce55e10eb3bc2e9c4586c705a4e8da41e5eacf5
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

  # ── Loki — log storage (phase 7.1) ───────────────────────────────────
  loki:
    image: grafana/loki:3.3.2@sha256:8af2de1abbdd7aa92b27c9bcc96f0f4140c9096b507c77921ffddf1c6ad6c48f
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    restart: unless-stopped

  # ── Promtail — log collector (phase 7.1) ─────────────────────────────
  # Reads the docker daemon socket (read-only) to discover and tail
  # containers from THIS compose project only.
  promtail:
    image: grafana/promtail:3.3.2@sha256:cb4990801ec58975c5e231057c2bcf204c85fac428eec65ad66e0016c64b9608
    user: "0:0"  # needs to read /var/run/docker.sock
    volumes:
      - ./monitoring/promtail/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["-config.file=/etc/promtail/config.yaml"]
    depends_on:
      - loki
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

  # ── Tempo — traces backend (phase 7.5) ──────────────────────────────
  tempo:
    image: grafana/tempo:2.6.1@sha256:ef4384fce6e8ad22b95b243d8fc165628cda655376fd50e7850536ad89d71d50
    ports:
      - "127.0.0.1:3200:3200"   # tempo HTTP API
      - "127.0.0.1:4317:4317"   # OTLP gRPC
      - "127.0.0.1:4318:4318"   # OTLP HTTP
    volumes:
      - ./monitoring/tempo/tempo-config.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    command: ["-config.file=/etc/tempo.yaml"]
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped

  # ── Grafana ──────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.6.0@sha256:62d2b9d20a19714ebfe48d1bb405086081bc602aa053e28cf6d73c7537640dfb
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:?GF_ADMIN_USER is required}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:?GF_ADMIN_PASSWORD is required}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped

volumes:
  mlflow-data:
  mlflow-postgres-data:
  minio-data:
  prometheus-data:
  grafana-data:
  alertmanager-data:
  loki-data:
  tempo-data:
