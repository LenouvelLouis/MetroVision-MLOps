# MLflow basic-auth bootstrap config — DEV ONLY.
# Admin credentials here are used only the FIRST time the container starts
# (after the basic_auth.db is created they are no longer authoritative).
# For production, rotate the admin password via the MLflow auth API
# and store the credential outside of git (Vault, ESO, etc.).
[mlflow]
default_permission = READ
database_uri = sqlite:////mlflow/basic_auth.db
admin_username = admin
admin_password = dev-mlflow-password
authorization_function = mlflow.server.auth:authenticate_request_basic_auth
