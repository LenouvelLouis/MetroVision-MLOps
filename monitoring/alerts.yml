groups:
  - name: metrovision-api
    rules:
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(metrovision_request_duration_seconds_bucket[5m])) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High prediction latency (p95 > 5s)"
          description: "The 95th percentile latency has exceeded 5 seconds for more than 2 minutes."

      - alert: HighErrorRate
        expr: sum(rate(metrovision_requests_total{status="error"}[5m])) / sum(rate(metrovision_requests_total[5m])) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate (> 5%)"
          description: "More than 5% of prediction requests are failing."

      - alert: NoTraffic
        expr: sum(rate(metrovision_requests_total[10m])) == 0
        for: 15m
        labels:
          severity: info
        annotations:
          summary: "No traffic to MetroVision API"
          description: "The API has received zero requests in the last 15 minutes."

      # ── ML-security alert (phase 5.4) ────────────────────────────────
      - alert: DataDriftDetected
        expr: max(metrovision_drift_score) by (feature_set) > 0.3
        for: 30m
        labels:
          severity: warning
          domain: ml-security
        annotations:
          summary: "Drift score > 0.3 on {{ $labels.feature_set }}"
          description: |
            Evidently reported a drift score of {{ $value }} on feature
            set "{{ $labels.feature_set }}" for more than 30 minutes.
            This can indicate legitimate distribution shift OR a poisoning
            / evasion attempt — review the latest drift report and the
            traffic source before retraining.

      # ── Security alerts (phase 7.2) ─────────────────────────────────
      # Sustained rate-limit hits suggest scripted abuse from a single key
      # or a misbehaving client. The threshold is intentionally low because
      # 10 r/m is the per-IP limit; > 2 r/m sustained = real signal.
      - alert: RateLimitAbuse
        expr: sum(rate(metrovision_errors_total{reason="rate_limited"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
          domain: security
        annotations:
          summary: "Sustained rate-limit hits ({{ $value | printf \"%.2f\" }}/s)"
          description: |
            Clients are hitting the rate limit on /predict at >2 r/s
            for >5 minutes. Likely either a runaway client or a credential
            stuffing attempt — check the audit logs for the IP / API-key
            hash distribution.

      # Spike in invalid-type uploads = probing.
      - alert: InvalidUploadSpike
        expr: sum(rate(metrovision_errors_total{reason="invalid_type"}[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
          domain: security
        annotations:
          summary: "Invalid uploads >0.5/s for >5m"
          description: |
            The API is rejecting non-image uploads at a sustained rate.
            This is the signature of automated fuzzing or content-type
            confusion attempts. Inspect audit logs for the source IPs.

      # Models failed integrity check at startup -> manifest mismatch.
      - alert: ModelIntegrityFailure
        expr: sum(rate(metrovision_errors_total{reason="models_not_loaded"}[5m])) > 0
        for: 1m
        labels:
          severity: critical
          domain: security
        annotations:
          summary: "API rejecting traffic - models not loaded"
          description: |
            /predict is returning 503 because the model integrity check
            blocked startup. Inspect the API logs for ModelIntegrityError
            and verify model/manifest.json was not tampered with.
