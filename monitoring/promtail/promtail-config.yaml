server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Tail every container in the compose project via the Docker daemon.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        # Only services from THIS compose project; ignore unrelated containers
        # already running on the host (e.g. portainer, elasticsearch).
        filters:
          - name: label
            values: ["com.docker.compose.project=metrovision-mlops"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
    pipeline_stages:
      # The API emits JSON logs (phase 1.7) - keep them intact in Loki.
      - json:
          expressions:
            level: level
            logger: logger
            msg: msg
      - labels:
          level:
