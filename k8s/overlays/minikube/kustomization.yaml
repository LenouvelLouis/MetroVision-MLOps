apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  # Local-only secrets in place of the Vault-backed ExternalSecret.
  - dev-secrets.yaml

patches:
  - path: service-nodeport.yaml
  # Drop the Vault wiring on minikube (no Vault, no ESO controller).
  - patch: |-
      $patch: delete
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: metrovision-api-keys
  - patch: |-
      $patch: delete
      apiVersion: external-secrets.io/v1beta1
      kind: SecretStore
      metadata:
        name: vault-backend
  # No real cert-manager / Let's Encrypt on minikube either.
  - patch: |-
      $patch: delete
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: letsencrypt-prod

# Minikube uses locally built images
images:
  - name: metrovision-api
    newTag: dev
