---
# Nightly logical backup of the MLflow Postgres database to MinIO/S3.
# The backup is a single pg_dump piped through aws s3 cp so nothing
# touches the local disk — survives PVC loss and pod reschedules.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mlflow-postgres-backup
spec:
  schedule: "17 2 * * *" # daily, 02:17 UTC (off-peak)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: ghcr.io/metrovision/pg-backup:latest # contains pg_dump + awscli
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              envFrom:
                - secretRef:
                    name: mlflow-postgres-credentials
                - secretRef:
                    name: minio-credentials
              env:
                - name: PGHOST
                  value: mlflow-postgres
                - name: PGDATABASE
                  value: mlflow
                - name: AWS_ENDPOINT_URL
                  value: http://minio:9000
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -euo pipefail
                  STAMP=$(date -u +%Y%m%dT%H%M%SZ)
                  pg_dump --no-owner --format=custom \
                    | aws s3 cp - "s3://mlflow-backups/postgres/${STAMP}.dump"
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                medium: Memory
                sizeLimit: 32Mi
