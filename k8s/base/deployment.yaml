apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrovision-api
  labels:
    app: metrovision-api
    component: inference
spec:
  replicas: 2
  selector:
    matchLabels:
      app: metrovision-api
  template:
    metadata:
      labels:
        app: metrovision-api
        component: inference
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: api
          image: metrovision-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: metrovision-config
            - secretRef:
                name: metrovision-secret
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
