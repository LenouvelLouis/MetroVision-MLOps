apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - pairs:
      project: metrovision-mlops
    includeSelectors: true

resources:
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - hpa.yaml
  - pdb.yaml
  - networkpolicy.yaml
  - ingress.yaml
  - external-secret.yaml
  - cronjob-backup.yaml
  # secret.yaml is intentionally NOT included here in production:
  # ExternalSecret renders the real secret from Vault. Keep secret.yaml
  # for local minikube usage via the overlay.
