---
# Vault SecretStore — points the namespace at the company Vault.
# Authentication is delegated to a Kubernetes ServiceAccount via the
# `kubernetes` auth method in Vault. ESO controller talks to Vault on
# behalf of every ExternalSecret in this namespace.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: https://vault.example.com
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: metrovision-api
          serviceAccountRef:
            name: external-secrets-reader
---
# API keys secret rendered from Vault. The controller materialises a
# Kubernetes Secret named `metrovision-api-keys` whose `api-keys` key
# is consumed by the Deployment as a read-only file mount.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: metrovision-api-keys
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: metrovision-api-keys
    creationPolicy: Owner
  data:
    - secretKey: api-keys
      remoteRef:
        key: metrovision/api-keys
        property: digests
