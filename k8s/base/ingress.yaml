apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: metrovision-api
  annotations:
    # cert-manager issues + renews the TLS cert via Let's Encrypt.
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # NGINX forces HTTPS (301) and bumps the body-size limit a touch
    # above the application-level 10 MB so the API can produce its own
    # 413 (with metric + log) before the ingress drops the payload.
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "11m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - metrovision.example.com
      secretName: metrovision-api-tls
  rules:
    - host: metrovision.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: metrovision-api
                port:
                  number: 8000
---
# cert-manager ClusterIssuer for Let's Encrypt production.
# Keep this OUT of the base if a cluster already has one — it is
# namespace-less and side-effects-only on a fresh cluster.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@metrovision.example.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
