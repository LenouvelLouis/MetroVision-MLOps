---
# Default deny-all: every workload in the namespace starts with no ingress
# and no egress. Each application then opens the strict minimum below.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
# API ingress: only the Ingress controller (or other pods labelled
# `role: api-client`) may reach the API on port 8000.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-allow-ingress
spec:
  podSelector:
    matchLabels:
      app: metrovision-api
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              role: api-client
      ports:
        - port: 8000
          protocol: TCP
---
# API egress: DNS + outbound to MLflow only. No internet, no other pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-allow-egress
spec:
  podSelector:
    matchLabels:
      app: metrovision-api
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: mlflow
      ports:
        - port: 5000
          protocol: TCP
